name: python greetings

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  install-pip-deps:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Installing all required depdendencies.." 
      - name: List all files
        run: ls
      - uses: actions/checkout@v6
        with:
          repository: 'mtararujs/python-greetings'
          path: python-greetings
      - name: working directory 
        working-directory: python-greetings
        run: python -m venv venv
      - name: bibliotēku/pakotņu instalācijai pret virtualizēto vidi
        working-directory: python-greetings
        run: .\venv\Scripts\python.exe -m pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - name: Print step name
        run: echo "Deployment to DEV environment has started.."
      - uses: actions/checkout@v6
        with:
          repository: 'mtararujs/python-greetings'
          path: python-greetings
        # working-directory: python-greetings
  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on DEV environment"
  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to STG environment has started.."
  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on STG environment" 
  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to PREPROD environment has started.."
  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on PREPROD environment" 
  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to PROD environment has started.."
  Tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on PROD environment"

        
