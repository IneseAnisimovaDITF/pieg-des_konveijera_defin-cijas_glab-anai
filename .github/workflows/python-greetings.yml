name: python greetings

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  install-pip-deps:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Installing all required depdendencies.." 
      - name: List all files
        run: ls
      - uses: actions/checkout@v6
        with:
          repository: 'mtararujs/python-greetings'
          path: python-greetings
      - name: working directory 
        working-directory: python-greetings
        run: python -m venv venv
      - name: bibliotēku/pakotņu instalācijai pret virtualizēto vidi
        working-directory: python-greetings
        run: .\venv\Scripts\python.exe -m pip install -r requirements.txt
        
  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - name: Print step name
        run: echo "Deployment to DEV environment has started.."
      - uses: actions/checkout@v6
        with:
          repository: 'mtararujs/python-greetings'
          path: python-greetings
      - name: working directory 
        working-directory: python-greetings
        run: python -m venv venv
      - name: bibliotēku/pakotņu instalācijai pret virtualizēto vidi
        working-directory: python-greetings
        run: .\venv\Scripts\python.exe -m pip install -r requirements.txt
      - name: apstādinātu esošo vides servisu 
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-dev & EXIT /B 0
      - name: PM2 example
        shell: cmd
        working-directory: python-greetings
        run: pm2 start app.py --name greetings-app-dev --interpreter venv\Scripts\python.exe -- --port 7001
  
  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on DEV environment"
      - uses: actions/checkout@v6
        with:
          repository: 'mtararujs/course-js-api-framework '
          path: course-js-api-framework
      - name: working directory 
        working-directory: course-js-api-framework
        run: npm install
      - name: izpildit npm run
        working-directory: course-js-api-framework
        run: npm run greetings greetings_dev
  
  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - name: Print step name
        run: echo "Deployment to STG environment has started.."
      - uses: actions/checkout@v6
        with:
          repository: 'mtararujs/python-greetings'
          path: python-greetings
          clean: false
      - name: apstādinātu esošo vides servisu 
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-stg & EXIT /B 0
      - name: PM2 example
        shell: cmd
        working-directory: python-greetings
        run: pm2 start app.py --name greetings-app-stg --interpreter venv\Scripts\python.exe -- --port 7002
  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on STG environment" 
      - uses: actions/checkout@v6
        with:
          repository: 'mtararujs/course-js-api-framework '
          path: course-js-api-framework
      - name: working directory 
        working-directory: course-js-api-framework
        run: npm install
      - name: izpildit npm run
        working-directory: course-js-api-framework
        run: npm run greetings greetings_stg
        
  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to PREPROD environment has started.."
      - uses: actions/checkout@v6
        with:
          repository: 'mtararujs/python-greetings'
          path: python-greetings
          clean: false
      - name: apstādinātu esošo vides servisu 
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-preprod & EXIT /B 0
      - name: PM2 example
        shell: cmd
        working-directory: python-greetings
        run: pm2 start app.py --name greetings-app-preprod --interpreter venv\Scripts\python.exe -- --port 7003
  
  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on PREPROD environment" 
  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to PROD environment has started.."
      - uses: actions/checkout@v6
        with:
          repository: 'mtararujs/python-greetings'
          path: python-greetings
      - name: working directory 
        working-directory: python-greetings
        run: python -m venv venv
      - name: bibliotēku/pakotņu instalācijai pret virtualizēto vidi
        working-directory: python-greetings
        run: .\venv\Scripts\python.exe -m pip install -r requirements.txt
      - name: apstādinātu esošo vides servisu 
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-prod & EXIT /B 0
      - name: PM2 example
        shell: cmd
        working-directory: python-greetings
        run: pm2 start app.py --name greetings-app-prod --interpreter venv\Scripts\python.exe -- --port 7004
  Tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on PROD environment"

        
